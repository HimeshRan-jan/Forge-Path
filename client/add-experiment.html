  <div class="app-wrapper">
    

    <main class="main-content">
      <div class="mb-6">
        <h1 style="margin:0;">Add New Experiment</h1>
        <p class="text-secondary mt-2">Document your latest technical exploration.</p>
      </div>

      <div class="card mb-6">
        <form id="experimentForm">
          <div class="form-grid">
            <div class="form-group col-span-2">
              <label class="form-label" for="title">Title *</label>
              <input type="text" id="title" class="form-control" required placeholder="e.g. Setting up a React Native app">
            </div>

            <div class="form-group">
              <label class="form-label" for="technology">Technology *</label>
              <input type="text" id="technology" class="form-control" required placeholder="e.g. React Native">
            </div>

            <div class="form-group">
              <label class="form-label" for="framework">Framework</label>
              <input type="text" id="framework" class="form-control" placeholder="e.g. Expo">
            </div>

            <div class="form-group">
              <label class="form-label" for="category">Category</label>
              <input type="text" id="category" class="form-control" placeholder="e.g. Mobile Development">
            </div>

            <div class="form-group">
              <label class="form-label" for="status">Status</label>
              <select id="status" class="form-control">
                <option value="Draft">Draft</option>
                <option value="In Progress">In Progress</option>
                <option value="Success">Success</option>
                <option value="Failed">Failed</option>
              </select>
            </div>
            
            <div class="form-group">
              <label class="form-label" for="difficulty">Difficulty</label>
              <select id="difficulty" class="form-control">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="tags">Tags (comma separated)</label>
              <input type="text" id="tags" class="form-control" placeholder="e.g. UI, Mobile, Expo">
            </div>
          </div>

          <div class="form-group mt-4">
            <label class="form-label" for="setupDetails">Setup Details & Background Context</label>
            <textarea id="setupDetails" class="form-control" rows="3" placeholder="Describe your setup, constraints, and goals..."></textarea>
          </div>

          <div class="form-group mt-4">
            <label class="form-label" for="stepsPerformed">Steps Performed</label>
            <textarea id="stepsPerformed" class="form-control" rows="4" placeholder="1. Did this...&#10;2. Did that..."></textarea>
          </div>

          <div class="form-grid mt-4">
            <div class="form-group">
              <label class="form-label" for="expectedResult">Expected Result</label>
              <textarea id="expectedResult" class="form-control" rows="3" placeholder="What you expected to happen"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label" for="observedOutcome">Observed Outcome</label>
              <textarea id="observedOutcome" class="form-control" rows="3" placeholder="What actually happened"></textarea>
            </div>
          </div>

          <div class="form-grid mt-4">
            <div class="form-group">
              <label class="form-label" for="issuesFaced">Issues Faced</label>
              <textarea id="issuesFaced" class="form-control" rows="3" placeholder="Any problems encountered"></textarea>
            </div>
            <div class="form-group">
              <label class="form-label" for="solutionNotes">Solution Notes</label>
              <textarea id="solutionNotes" class="form-control" rows="3" placeholder="How you resolved issues"></textarea>
            </div>
          </div>
          
          <div class="mt-4">
            <button type="submit" class="btn btn-primary w-100" id="saveExperimentBtn" style="padding:0.85rem;">Save Experiment</button>
          </div>
        </form>
      </div>
    </main>
  </div>
