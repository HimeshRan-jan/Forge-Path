<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your Forge Path profile — view your rank, XP, and earned badges.">
  <title>Profile — Forge Path</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-header {
      display: flex;
      align-items: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: white;
      font-weight: 800;
      flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
      position: relative;
    }
    .avatar::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
      z-index: -1;
      opacity: 0.3;
      filter: blur(8px);
    }
    .profile-info h1 { margin-bottom: 0.25rem; font-size: 1.5rem; }
    .profile-info p { color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 0.9rem; }
    .profile-badges-grid {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }
    .profile-badge-card {
      background: var(--surface-muted);
      padding: 1.25rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 130px;
      text-align: center;
      transition: all var(--transition-base);
    }
    .profile-badge-card:hover {
      transform: translateY(-3px);
      border-color: var(--primary-border);
      box-shadow: var(--shadow-glow);
    }
    .profile-badge-card .badge-emoji { font-size: 2rem; margin-bottom: 0.5rem; }
    .profile-badge-card strong { font-size: 0.85rem; }
    .profile-badge-card .badge-date { font-size: 0.7rem; color: var(--text-tertiary); margin-top: 0.25rem; }
    
    @media (max-width: 768px) {
      .profile-header { flex-direction: column; text-align: center; }
      .profile-info > div { justify-content: center; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:1rem;">
      <button class="menu-toggle" onclick="toggleTopNav()" aria-label="Toggle menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <a href="dashboard.html" class="navbar-brand" style="gap:0.6rem;">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
          <polygon points="16,3 29,16 16,29 3,16" fill="#0f172a" stroke="#1e3a8a" stroke-width="2.5" stroke-linejoin="round"/>
          <circle cx="16" cy="11" r="2" fill="#f97316"/>
          <path d="M16 23V14M12 18l4-4 4 4" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div style="width:1px;height:22px;background:rgba(255,255,255,0.2);margin:0 0.1rem;"></div>
        <div style="display:flex;flex-direction:column;justify-content:center;line-height:1;">
          <div style="display:flex;align-items:baseline;">
            <span class="brand-text">ForgePath</span>
          </div>
          <span style="font-size:0.4rem;color:var(--text-tertiary);letter-spacing:0.12em;font-weight:600;margin-top:0.15rem;text-transform:uppercase;">Forge Your Career Path</span>
        </div>
      </a>
          <div class="top-nav-links" id="topNavLinks">
        <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
        <a href="roadmap.html" class="nav-link">🗺️ Roadmap</a>
        <div class="nav-dropdown">
          <a href="javascript:void(0)" onclick="toggleMyExperiments(event)" class="nav-link">
            <span>🧪 Experiments</span>
            <span class="exp-caret" style="font-size:0.8em; transition: transform 0.2s;">▼</span>
          </a>
          <div id="exp-submenu" class="nav-dropdown-menu" style="display: none;">
            <a href="experiments.html" class="nav-link">📋 View List</a>
            <a href="add-experiment.html" class="nav-link">➕ Add New</a>
            <a href="compare.html" class="nav-link">⚖️ Compare</a>
          </div>
        </div>
        <a href="profile.html" class="nav-link active">👤 Profile</a>
        <a href="about-us.html" class="nav-link">ℹ️ About Us</a>
        <a href="manual.html" class="nav-link">📖 Manual</a>
      </div>
</div>
    <div class="navbar-nav">
      
    <div class="noti-container">
      <button class="noti-btn" onclick="toggleNotiDropdown(event)" aria-label="Notifications">
        🔔
        <span class="noti-badge" id="notiBadge"></span>
      </button>
      <div class="noti-dropdown" id="notiDropdown">
        <div class="noti-header">Recent Achievements</div>
        <div class="noti-list" id="notiList">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
      <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>
  </nav>

  

  <div class="app-wrapper">
    

    <main class="main-content">
      <div class="card">
        <div class="profile-header">
          <div class="avatar" id="avatarInitials">U</div>
          <div class="profile-info">
            <h1 id="profileName">Loading...</h1>
            <p id="profileEmail">loading@example.com</p>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
              <span class="badge badge-primary" id="profileLevel">Level</span>
              <span class="badge" id="profileXp" style="font-family:'JetBrains Mono',monospace;">0 XP</span>
            </div>
          </div>
        </div>

        <h3 class="mb-4" style="margin-top:1.5rem;">Acquired Milestones</h3>
        <div id="profileMilestones" class="profile-badges-grid">
          <p class="text-secondary">Loading milestones...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
